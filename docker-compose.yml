services:
  mangaarr:
    build: .
    container_name: mangaarr
    restart: unless-stopped
    ports:
      - "8192:8192"
    volumes:
      - /opt/containers/media-stack/config/mangaarr:/config
      - /mnt/media/Manga:/manga
    environment:
      - TZ=America/Chicago
      - ASPNETCORE_URLS=http://+:8192
      - Database__Path=/config/mangaarr.db
      - MangaDex__BaseUrl=https://api.mangadex.org
      - MangaDex__Language=en
      - Komga__BaseUrl=http://192.168.2.150:25600
      - Komga__ApiKey=
      - Monitoring__Enabled=true
      - Monitoring__CheckIntervalHours=24
      - Monitoring__AutoDownload=true
      - Paths__MangaLibrary=/manga
      - Paths__DownloadCache=/tmp/manga-arr
      - Paths__Logs=/config/logs
    networks:
      - media
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  media:
    external: true
